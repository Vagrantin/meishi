<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Card – Matthieu Ducorps</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        min-height: 100vh;
            display: flex;
                align-items: center;
                    justify-content: center;
                        background: #0d0d0d;
                            font-family: 'IBM Plex Mono', monospace;
                                padding: 24px 16px;
                                  }

                                    /* subtle grid background */
                                      body::before {
                                          content: '';
                                              position: fixed;
                                                  inset: 0;
                                                      background-image:
                                                            linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
                                                                  linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
                                                                      background-size: 40px 40px;
                                                                          pointer-events: none;
                                                                            }

                                                                              .scene {
                                                                                  perspective: 900px;
                                                                                      width: 100%;
                                                                                          max-width: 560px;
                                                                                            }

                                                                                              .card {
                                                                                                  width: 100%;
                                                                                                      position: relative;
                                                                                                          border-radius: 14px;
                                                                                                              background: #111;
                                                                                                                  border: 1px solid #2a2a2a;
                                                                                                                      box-shadow:
                                                                                                                            0 0 0 1px #1a1a1a,
                                                                                                                                  0 30px 80px rgba(0,0,0,.9),
                                                                                                                                        inset 0 1px 0 rgba(255,255,255,.06);
                                                                                                                                            overflow: hidden;
                                                                                                                                                animation: float 6s ease-in-out infinite;
                                                                                                                                                    cursor: default;
                                                                                                                                                        transition: box-shadow .3s;
                                                                                                                                                          }

                                                                                                                                                            .card:hover {
                                                                                                                                                                box-shadow:
                                                                                                                                                                      0 0 0 1px #2a2a2a,
                                                                                                                                                                            0 40px 100px rgba(0,0,0,.95),
                                                                                                                                                                                  0 0 60px rgba(122,234,158,.04),
                                                                                                                                                                                        inset 0 1px 0 rgba(255,255,255,.08);
                                                                                                                                                                                          }

                                                                                                                                                                                            @keyframes float {
                                                                                                                                                                                                0%, 100% { transform: rotateX(2deg) rotateY(-3deg) translateY(0); }
                                                                                                                                                                                                    50%       { transform: rotateX(-1deg) rotateY(3deg) translateY(-8px); }
                                                                                                                                                                                                      }

                                                                                                                                                                                                        /* Disable 3d float on touch/mobile — looks jittery */
                                                                                                                                                                                                          @media (hover: none) {
                                                                                                                                                                                                              @keyframes float {
                                                                                                                                                                                                                    0%, 100% { transform: translateY(0); }
                                                                                                                                                                                                                          50%       { transform: translateY(-6px); }
                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                  /* left accent strip */
                                                                                                                                                                                                                                    .card::before {
                                                                                                                                                                                                                                        content: '';
                                                                                                                                                                                                                                            position: absolute;
                                                                                                                                                                                                                                                left: 0; top: 0; bottom: 0;
                                                                                                                                                                                                                                                    width: 3px;
                                                                                                                                                                                                                                                        background: linear-gradient(180deg, #7aea9e 0%, #3dd68c 50%, #1a9e5a 100%);
                                                                                                                                                                                                                                                            border-radius: 14px 0 0 14px;
                                                                                                                                                                                                                                                                z-index: 2;
                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                    /* noise overlay */
                                                                                                                                                                                                                                                                      .card::after {
                                                                                                                                                                                                                                                                          content: '';
                                                                                                                                                                                                                                                                              position: absolute;
                                                                                                                                                                                                                                                                                  inset: 0;
                                                                                                                                                                                                                                                                                      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
                                                                                                                                                                                                                                                                                          background-size: 200px 200px;
                                                                                                                                                                                                                                                                                              pointer-events: none;
                                                                                                                                                                                                                                                                                                  opacity: .5;
                                                                                                                                                                                                                                                                                                      z-index: 1;
                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                          .inner {
                                                                                                                                                                                                                                                                                                              position: relative;
                                                                                                                                                                                                                                                                                                                  z-index: 3;
                                                                                                                                                                                                                                                                                                                      padding: clamp(24px, 5vw, 36px) clamp(24px, 5vw, 40px) clamp(24px, 5vw, 32px) clamp(32px, 6vw, 52px);
                                                                                                                                                                                                                                                                                                                          display: flex;
                                                                                                                                                                                                                                                                                                                              flex-direction: column;
                                                                                                                                                                                                                                                                                                                                  gap: clamp(16px, 3vw, 20px);
                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                      /* top section */
                                                                                                                                                                                                                                                                                                                                        .top {
                                                                                                                                                                                                                                                                                                                                            display: flex;
                                                                                                                                                                                                                                                                                                                                                justify-content: space-between;
                                                                                                                                                                                                                                                                                                                                                    align-items: flex-start;
                                                                                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                                                                        .company {
                                                                                                                                                                                                                                                                                                                                                            font-family: 'IBM Plex Mono', monospace;
                                                                                                                                                                                                                                                                                                                                                                font-size: clamp(9px, 2.2vw, 10px);
                                                                                                                                                                                                                                                                                                                                                                    font-weight: 600;
                                                                                                                                                                                                                                                                                                                                                                        letter-spacing: .25em;
                                                                                                                                                                                                                                                                                                                                                                            text-transform: uppercase;
                                                                                                                                                                                                                                                                                                                                                                                color: #3dd68c;
                                                                                                                                                                                                                                                                                                                                                                                    opacity: .9;
                                                                                                                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                                                                                                        .logo-mark {
                                                                                                                                                                                                                                                                                                                                                                                            width: 34px;
                                                                                                                                                                                                                                                                                                                                                                                                height: 34px;
                                                                                                                                                                                                                                                                                                                                                                                                    border: 1.5px solid #2a2a2a;
                                                                                                                                                                                                                                                                                                                                                                                                        border-radius: 8px;
                                                                                                                                                                                                                                                                                                                                                                                                            display: flex;
                                                                                                                                                                                                                                                                                                                                                                                                                align-items: center;
                                                                                                                                                                                                                                                                                                                                                                                                                    justify-content: center;
                                                                                                                                                                                                                                                                                                                                                                                                                        background: #161616;
                                                                                                                                                                                                                                                                                                                                                                                                                            flex-shrink: 0;
                                                                                                                                                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                                                                                                                                                                .logo-mark svg {
                                                                                                                                                                                                                                                                                                                                                                                                                                    width: 16px;
                                                                                                                                                                                                                                                                                                                                                                                                                                        height: 16px;
                                                                                                                                                                                                                                                                                                                                                                                                                                            fill: none;
                                                                                                                                                                                                                                                                                                                                                                                                                                                stroke: #3dd68c;
                                                                                                                                                                                                                                                                                                                                                                                                                                                    stroke-width: 2;
                                                                                                                                                                                                                                                                                                                                                                                                                                                        stroke-linecap: round;
                                                                                                                                                                                                                                                                                                                                                                                                                                                            opacity: .85;
                                                                                                                                                                                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                /* name block */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  .name-block {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      display: flex;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          flex-direction: column;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              gap: 8px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  .name {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      font-family: 'IBM Plex Sans', sans-serif;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          font-size: clamp(22px, 6vw, 30px);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              font-weight: 600;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  letter-spacing: -.02em;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      color: #f0f0f0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          line-height: 1;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              .title {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  font-size: clamp(9px, 2.4vw, 11px);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      font-weight: 300;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          letter-spacing: .1em;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              color: #555;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  text-transform: uppercase;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      /* wrap gracefully on narrow screens */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          display: flex;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              flex-wrap: wrap;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  gap: 4px 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      row-gap: 2px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          .title span { color: #7aea9e; opacity: .7; }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            /* divider */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              .divider {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  height: 1px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      background: linear-gradient(90deg, #2a2a2a 0%, transparent 100%);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          /* contact grid — single row on wide, wraps to two columns on narrow */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            .contact {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                display: flex;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    flex-wrap: wrap;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        gap: 14px 24px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            padding-bottom: 4px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                .contact-item {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    display: flex;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        align-items: center;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            gap: 8px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                text-decoration: none;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    color: #444;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        font-size: clamp(10px, 2.5vw, 10.5px);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            font-weight: 400;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                letter-spacing: .03em;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    transition: color .2s;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        /* prevent orphaned icon+label wrap mid-item */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            white-space: nowrap;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                .contact-item:hover,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  .contact-item:active { color: #7aea9e; }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .contact-item svg {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        width: 13px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            height: 13px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                fill: none;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    stroke: #3dd68c;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        stroke-width: 1.5;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            stroke-linecap: round;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                stroke-linejoin: round;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    opacity: .6;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        flex-shrink: 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            transition: opacity .2s;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                .contact-item:hover svg,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  .contact-item:active svg { opacity: 1; }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    /* copyright line */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      .prompt {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          font-size: clamp(8px, 1.8vw, 9px);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              color: #262626;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  letter-spacing: .08em;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      font-weight: 300;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          user-select: none;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              text-align: right;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  padding-bottom: clamp(14px, 3vw, 18px);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      padding-right: clamp(16px, 3vw, 24px);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          /* pull out of inner padding flow */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              margin-top: -8px;
